{% extends "site_recipes_app/base.html" %}

{% block title %}
    Создать рецепт
{% endblock %}

{% block body %}
    <nav>
        <ul>
            <li>
                <a href="{% url 'site_recipes_app:main' %}">Вернуться на главную</a>
            </li>
            <li>
                <a href="{% url 'site_recipes_app:recipes' %}">Список рецептов</a>
            </li>
        </ul>
    </nav>
    <h1>Создание рецепта</h1>
    <div>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Добавить новый рецепт</button>
        </form>
    </div>
{% endblock %}
